# HPA — CPU-based scaling
#
# Target: 50% average CPU utilization across all php-apache pods.
# When average CPU rises above 50% of the 200m request (= 100m), HPA adds replicas.
# When average CPU drops below 50%, HPA removes replicas after the cooldown window.
#
# Scale-down stabilization is set to 60 seconds for observable demo behavior.
# In production, use 300 seconds (5 minutes) to avoid flapping.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: php-apache-hpa-cpu
  namespace: autoscaling-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: php-apache
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60      # demo-tuned: production recommended 300
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0       # scale up immediately on demand
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
