apiVersion: apps/v1
kind: Deployment
metadata:
  name: aset-whoami
  namespace: aset-whoami
  labels:
    app: aset-whoami
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aset-whoami
  template:
    metadata:
      labels:
        app: aset-whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          ports:
            - containerPort: 80
