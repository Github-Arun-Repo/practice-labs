apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-demo-parent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Github-Arun-Repo/practice-labs.git
    targetRevision: main
    path: argocd-reference-architectures/app-of-apps-demo/argocd/children
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
