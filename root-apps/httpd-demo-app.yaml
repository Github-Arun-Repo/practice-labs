apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: httpd-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Github-Arun-Repo/practice-labs.git
    targetRevision: main
    path: apps-config/httpd-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: httpd-demo
  syncPolicy:
    automated:
      selfHeal: true
